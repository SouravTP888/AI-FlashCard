<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse AI — Premium Flashcard & Study Deck Generator</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ✅ FIXED CSS PATH -->
  <link rel="stylesheet" href="style.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dark-theme">

  <!-- Background -->
  <div class="bg-blur-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i data-lucide="brain-circuit"></i>
        </div>
        <div class="logo-text">
          <h1>Synapse<span>AI</span></h1>
          <span class="tagline">Premium revision deck studio</span>
        </div>
      </div>

      <div class="header-actions">
        <div class="status-badge">
          <span class="status-dot green"></span>
          <span class="status-text">Server Connected</span>
        </div>

        <button class="btn btn-secondary btn-icon-only" id="themeToggle">
          <i data-lucide="sun"></i>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT (UNCHANGED UI) -->
    <main class="workspace-grid">

      <!-- INPUT PANEL -->
      <section class="panel glass input-panel">

        <div class="panel-header">
          <h2>Source Material</h2>
        </div>

        <textarea id="lessonContent"
          placeholder="Paste your study notes here..."></textarea>

        <button id="btnGenerate" class="btn btn-primary">
          Generate Study Deck
        </button>

      </section>

      <!-- OUTPUT PANEL -->
      <section class="panel glass output-panel">

        <h2>Revision Deck</h2>

        <div id="output">
          Ready to synthesize...
        </div>

      </section>

    </main>
  </div>

  <!-- Settings modal stays unchanged -->
  <div id="settingsModal" class="hidden"></div>

  <!-- ✅ FIXED SCRIPT PATH -->
  <script type="module" src="script.js"></script>
</body>
</html>
